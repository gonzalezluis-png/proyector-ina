<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyector INA</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Georgia', serif;
    background: #0d0d0d;
    color: #f0f0f0;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ══ SELECTOR ══ */
  #modo-selector {
    display: none;
    flex: 1;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 40px;
  }
  .sel-logo { font-size: 13px; font-family: sans-serif; letter-spacing: 4px; text-transform: uppercase; color: #555; }
  .sel-title { font-size: 26px; font-weight: 700; color: #ddd; font-family: sans-serif; text-align: center; }
  .sel-btns { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 320px; }
  .sel-btn {
    padding: 22px;
    border: 2px solid #2a2a2a;
    border-radius: 14px;
    background: #161616;
    color: #ccc;
    font-family: sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .sel-btn:hover { border-color: #4a6fa5; color: #fff; background: #1a2a45; }
  .sel-icon { font-size: 26px; display: block; margin-bottom: 6px; }
  .sel-sub { font-size: 12px; color: #555; font-weight: 400; margin-top: 4px; display: block; }

  /* ══ PROYECCIÓN ══ */
  #modo-proyeccion {
    display: none;
    flex: 1;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 40px;
    position: relative;
  }
  #proy-libro {
    font-size: clamp(16px, 2.5vw, 28px);
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #777;
    font-family: sans-serif;
    font-weight: 300;
    min-height: 1.4em;
  }
  #proy-numero {
    font-size: clamp(120px, 22vw, 280px);
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: -4px;
    text-shadow: 0 0 80px rgba(255,255,255,0.12);
    transition: opacity 0.3s, transform 0.3s;
  }
  #proy-numero.out { opacity: 0; transform: scale(0.9); }
  #proy-vacio {
    font-size: clamp(20px, 3.5vw, 42px);
    color: #2a2a2a;
    font-style: italic;
    font-family: sans-serif;
  }
  #proy-estado {
    position: fixed;
    top: 16px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-family: sans-serif;
    color: #333;
  }
  #proy-pie {
    position: fixed;
    bottom: 16px;
    right: 20px;
    font-size: 11px;
    color: #1e1e1e;
    font-family: sans-serif;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  #proy-sala {
    position: fixed;
    bottom: 16px;
    left: 20px;
    font-size: 13px;
    font-family: monospace;
    color: #2a2a2a;
  }

  /* ══ CONTROL ══ */
  #modo-control {
    display: none;
    flex: 1;
    flex-direction: column;
    background: #111;
  }
  .ctrl-header {
    background: #14142a;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #222244;
  }
  .ctrl-header h1 { font-size: 15px; font-weight: 600; color: #9090c0; font-family: sans-serif; letter-spacing: 1px; flex: 1; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%; background: #333; flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.online  { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
  .dot.error   { background: #f44336; box-shadow: 0 0 6px #f44336; }
  .dot.waiting { background: #ff9800; box-shadow: 0 0 6px #ff9800; }

  .ctrl-body { flex: 1; padding: 20px 18px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; }

  .campo-label { font-size: 10px; font-family: sans-serif; letter-spacing: 2px; text-transform: uppercase; color: #555; margin-bottom: 7px; }

  #ctrl-numero {
    width: 100%;
    font-size: 52px;
    font-weight: 700;
    background: #181818;
    border: 2px solid #2a2a2a;
    border-radius: 12px;
    color: #fff;
    padding: 14px 18px;
    text-align: center;
    outline: none;
    letter-spacing: 4px;
    -moz-appearance: textfield;
  }
  #ctrl-numero::-webkit-outer-spin-button,
  #ctrl-numero::-webkit-inner-spin-button { -webkit-appearance: none; }
  #ctrl-numero:focus { border-color: #4a6fa5; }

  .libros-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .libro-btn {
    padding: 11px 8px;
    background: #181818;
    border: 2px solid #2a2a2a;
    border-radius: 10px;
    color: #888;
    font-size: 12px;
    font-family: sans-serif;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    line-height: 1.3;
  }
  .libro-btn.selected { border-color: #4a6fa5; background: #18283f; color: #fff; }

  #btn-proyectar {
    width: 100%;
    padding: 17px;
    background: #4a6fa5;
    border: none;
    border-radius: 13px;
    color: #fff;
    font-size: 17px;
    font-family: sans-serif;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  #btn-proyectar:active { transform: scale(0.97); background: #3a5a90; }
  #btn-proyectar:disabled { background: #222; color: #444; cursor: default; }

  #btn-limpiar {
    width: 100%;
    padding: 11px;
    background: transparent;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    color: #444;
    font-size: 13px;
    font-family: sans-serif;
    cursor: pointer;
  }

  .historial { border-top: 1px solid #1e1e1e; padding-top: 14px; }
  .historial-title { font-size: 10px; font-family: sans-serif; letter-spacing: 2px; text-transform: uppercase; color: #333; margin-bottom: 9px; }
  .hist-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 11px; border-radius: 8px; background: #141414;
    margin-bottom: 5px; cursor: pointer; border: 1px solid #1a1a1a;
    transition: background 0.15s;
  }
  .hist-item:active { background: #1a2840; }
  .hist-num { font-size: 20px; font-weight: 700; color: #ccc; }
  .hist-libro { font-size: 11px; font-family: sans-serif; color: #444; }
  .hist-replay { font-size: 16px; color: #333; }

  /* ══ SALA ══ */
  #modo-sala {
    display: none;
    flex: 1;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    padding: 36px;
  }
  #modo-sala h2 { font-size: 20px; font-family: sans-serif; color: #bbb; }
  #modo-sala p { font-size: 13px; font-family: sans-serif; color: #555; text-align: center; max-width: 300px; line-height: 1.6; }
  #sala-input {
    width: 100%;
    max-width: 300px;
    padding: 14px 18px;
    background: #181818;
    border: 2px solid #2a2a2a;
    border-radius: 12px;
    color: #fff;
    font-size: 22px;
    font-family: monospace;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 4px;
    outline: none;
  }
  #sala-input:focus { border-color: #4a6fa5; }
  #btn-sala-ok {
    padding: 14px 40px;
    background: #4a6fa5;
    border: none;
    border-radius: 11px;
    color: #fff;
    font-size: 15px;
    font-family: sans-serif;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<!-- SELECTOR -->
<div id="modo-selector">
  <div class="sel-logo">Proyector INA</div>
  <div class="sel-title">¿Qué deseas abrir?</div>
  <div class="sel-btns">
    <button class="sel-btn" onclick="irA('proyeccion')">
      <span class="sel-icon">📺</span>
      Pantalla de Proyección
      <span class="sel-sub">Abrir en la tablet o pantalla grande</span>
    </button>
    <button class="sel-btn" onclick="irA('sala')">
      <span class="sel-icon">🎛️</span>
      Panel de Dirección
      <span class="sel-sub">Controlar desde el teléfono</span>
    </button>
  </div>
</div>

<!-- PROYECCIÓN -->
<div id="modo-proyeccion">
  <div id="proy-estado">
    <div class="dot" id="proy-dot"></div>
    <span id="proy-dot-label">Esperando control...</span>
  </div>
  <div id="proy-libro"></div>
  <div id="proy-numero" style="display:none"></div>
  <div id="proy-vacio">Esperando himno...</div>
  <div id="proy-sala"></div>
  <div id="proy-pie">PROYECTOR INA</div>
</div>

<!-- SALA (ingresar código) -->
<div id="modo-sala">
  <h2>Código de sala</h2>
  <p>Escribe el mismo código que aparece en la pantalla de proyección</p>
  <input type="text" id="sala-input" maxlength="12" placeholder="INA-2024" oninput="this.value=this.value.toUpperCase()">
  <button id="btn-sala-ok" onclick="conectarControl()">Conectar</button>
</div>

<!-- CONTROL -->
<div id="modo-control">
  <div class="ctrl-header">
    <div class="dot online" id="ctrl-dot"></div>
    <h1 id="ctrl-titulo">PANEL DE DIRECCIÓN</h1>
  </div>
  <div class="ctrl-body">
    <div>
      <div class="campo-label">Número de himno</div>
      <input type="number" id="ctrl-numero" placeholder="501" min="1" max="999" inputmode="numeric">
    </div>
    <div>
      <div class="campo-label">Himnario</div>
      <div class="libros-grid" id="libros-grid"></div>
    </div>
    <button id="btn-proyectar" onclick="proyectar()">Proyectar</button>
    <button id="btn-limpiar" onclick="limpiarPantalla()">Limpiar pantalla</button>
    <div class="historial">
      <div class="historial-title">Historial</div>
      <div id="historial-lista"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
const LIBROS = [
  { id: 'adventista', label: 'Himnario\nAdventista' },
  { id: 'esperanza',  label: 'Himnario\nEsperanza'  },
  { id: 'cantemos',   label: 'Cantemos al\nSeñor'   },
  { id: 'otro',       label: 'Otro'                  },
];

let libroSeleccionado = LIBROS[0].id;
let historial = JSON.parse(localStorage.getItem('ina_historial') || '[]');
let peer = null;
let conexion = null;   // conn en pantalla (entrante) o en control (saliente)

// ── Navegación ────────────────────────────────
function mostrar(id) {
  ['selector','proyeccion','sala','control'].forEach(m =>
    document.getElementById('modo-' + m).style.display = 'none'
  );
  document.getElementById('modo-' + id).style.display = 'flex';
}

function irA(modo) {
  localStorage.setItem('ina_modo', modo);
  if (modo === 'proyeccion') iniciarPantalla();
  else mostrar(modo);
}

// ── PANTALLA ──────────────────────────────────
function iniciarPantalla() {
  mostrar('proyeccion');
  const sala = generarSala();
  const peerId = 'ina-sala-' + sala;

  document.getElementById('proy-sala').textContent = 'Sala: ' + sala;

  if (peer) peer.destroy();
  peer = new Peer(peerId);

  peer.on('open', () => {
    setDotProy('waiting', 'Sala ' + sala + ' — esperando control...');
  });

  peer.on('connection', conn => {
    conexion = conn;
    conn.on('open', () => setDotProy('online', 'Control conectado'));
    conn.on('data', data => mostrarHimno(data));
    conn.on('close', () => setDotProy('waiting', 'Control desconectado'));
  });

  peer.on('error', e => {
    if (e.type === 'unavailable-id') {
      // sala ya ocupada, reintentar con nueva
      localStorage.removeItem('ina_sala');
      iniciarPantalla();
    } else {
      setDotProy('error', 'Error de conexión');
    }
  });
}

function generarSala() {
  let sala = localStorage.getItem('ina_sala');
  if (!sala) {
    const letras = 'ABCDEFGHJKLMNPQRSTUVWXY';
    sala = 'INA-' + Array.from({length: 4}, () => letras[Math.floor(Math.random()*letras.length)]).join('');
    localStorage.setItem('ina_sala', sala);
  }
  return sala;
}

function setDotProy(estado, label) {
  const dot = document.getElementById('proy-dot');
  dot.className = 'dot ' + estado;
  document.getElementById('proy-dot-label').textContent = label;
}

function mostrarHimno(data) {
  const elNum   = document.getElementById('proy-numero');
  const elLibro = document.getElementById('proy-libro');
  const elVacio = document.getElementById('proy-vacio');

  if (!data.numero) {
    elNum.style.display = 'none';
    elLibro.textContent = '';
    elVacio.style.display = '';
    return;
  }

  elVacio.style.display = 'none';
  elNum.classList.add('out');
  setTimeout(() => {
    elNum.textContent = data.numero;
    const libro = LIBROS.find(l => l.id === data.libro);
    elLibro.textContent = libro ? libro.label.replace('\n', ' ') : (data.libro || '');
    elNum.style.display = '';
    elNum.classList.remove('out');
  }, 250);
}

// ── CONTROL ──────────────────────────────────
function conectarControl() {
  const sala = document.getElementById('sala-input').value.trim().toUpperCase();
  if (!sala) return;
  const peerId = 'ina-sala-' + sala;

  mostrar('control');
  renderLibros();
  renderHistorial();

  if (peer) peer.destroy();
  peer = new Peer();

  peer.on('open', () => {
    conexion = peer.connect(peerId, { reliable: true });
    conexion.on('open', () => {
      setDotCtrl('online');
      document.getElementById('ctrl-titulo').textContent = 'SALA ' + sala;
    });
    conexion.on('close', () => setDotCtrl('error'));
    conexion.on('error', () => setDotCtrl('error'));
  });

  peer.on('error', () => setDotCtrl('error'));

  localStorage.setItem('ina_ctrl_sala', sala);
}

function setDotCtrl(estado) {
  document.getElementById('ctrl-dot').className = 'dot ' + estado;
}

function enviar(data) {
  if (!conexion || !conexion.open) { setDotCtrl('error'); return false; }
  conexion.send(data);
  return true;
}

function proyectar() {
  const num = document.getElementById('ctrl-numero').value.trim();
  if (!num) return;
  const btn = document.getElementById('btn-proyectar');
  const data = { numero: num, libro: libroSeleccionado };
  const ok = enviar(data);

  if (ok) {
    agregarHistorial(data);
    btn.textContent = '✓ Proyectado';
    btn.disabled = true;
    setTimeout(() => { btn.textContent = 'Proyectar'; btn.disabled = false; }, 1200);
  } else {
    btn.textContent = 'Sin conexión';
    setTimeout(() => { btn.textContent = 'Proyectar'; }, 2000);
  }
}

function limpiarPantalla() {
  enviar({ numero: '', libro: '' });
}

function renderLibros() {
  const grid = document.getElementById('libros-grid');
  grid.innerHTML = '';
  LIBROS.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'libro-btn' + (l.id === libroSeleccionado ? ' selected' : '');
    btn.innerHTML = l.label.replace('\n', '<br>');
    btn.onclick = () => { libroSeleccionado = l.id; renderLibros(); };
    grid.appendChild(btn);
  });
}

function agregarHistorial(data) {
  historial = historial.filter(h => !(h.numero === data.numero && h.libro === data.libro));
  historial.unshift(data);
  if (historial.length > 12) historial = historial.slice(0, 12);
  localStorage.setItem('ina_historial', JSON.stringify(historial));
  renderHistorial();
}

function renderHistorial() {
  const lista = document.getElementById('historial-lista');
  lista.innerHTML = '';
  historial.forEach(h => {
    const libro = LIBROS.find(l => l.id === h.libro);
    const item = document.createElement('div');
    item.className = 'hist-item';
    item.innerHTML = `
      <div>
        <div class="hist-num">${h.numero}</div>
        <div class="hist-libro">${libro ? libro.label.replace('\n',' ') : h.libro}</div>
      </div>
      <div class="hist-replay">▶</div>`;
    item.onclick = () => {
      document.getElementById('ctrl-numero').value = h.numero;
      libroSeleccionado = h.libro;
      renderLibros();
    };
    lista.appendChild(item);
  });
}

// ── Init ──────────────────────────────────────
const params = new URLSearchParams(location.search);
if (params.has('pantalla')) {
  iniciarPantalla();
} else if (params.has('control')) {
  const sala = localStorage.getItem('ina_ctrl_sala') || '';
  document.getElementById('sala-input').value = sala;
  mostrar('sala');
} else {
  mostrar('selector');
}
</script>
</body>
</html>
